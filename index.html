<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dominó Master - Vertical Premium</title>
<style>
:root { 
    --board-color: #10ac84; --border-color: #0b8e6b; --tile-color: #fffef5; 
    --line-color: #aaa; --text-color: #111; --bg-dark: #1e272e; 
    --accent-gold: #f1c40f; --turn-indicator: #e74c3c; 
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { 
    background: var(--bg-dark); color: #fff; font: 11px 'Segoe UI', sans-serif; 
    height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
}

/* Telas de Overlay */
#start-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.92); z-index: 6000; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
}
.start-title { color: var(--accent-gold); font-size: 28px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px;}
.start-sub { color: #aaa; margin-bottom: 30px; font-size: 14px; }
.start-btn {
    background: #10ac84; color: white; border: 2px solid var(--border-color);
    padding: 15px; border-radius: 8px; font-weight: bold; font-size: 14px;
    margin: 8px; cursor: pointer; text-transform: uppercase; width: 280px;
    transition: transform 0.1s, border-color 0.2s;
}
.start-btn:active { transform: scale(0.96); }
.start-btn b { color: var(--accent-gold); display: block; font-size: 11px; margin-top: 4px;}

/* UI Superior */
#header { 
    display:flex; justify-content:space-between; padding:5px 15px; 
    background: #000; align-items: center; height: 45px; z-index: 1000;
}
.team-score { text-align:center; min-width: 90px; background: #222; border-radius: 4px; padding: 2px; border: 1px solid #444; }
.team-score span { font-size: 9px; color: #aaa; text-transform: uppercase; }
.team-score b { font-size:16px; color:var(--accent-gold); display:block; }
#game-status { text-align:center; flex:1; color:var(--accent-gold); font-weight: bold; text-transform: uppercase; transition: color 0.3s; }

/* Painel de Resultado */
#result-area {
    display: none; background: #fff; color: #000; padding: 15px; text-align: center;
    border-bottom: 4px solid var(--accent-gold); z-index: 2000; position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

#game-area { flex: 1; display: flex; flex-direction: column; position: relative; z-index: 10; }
#board-container { flex: 1; background: var(--board-color); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }

/* Transição suave do Tabuleiro */
#snake { position: absolute; left: 50%; top: 50%; transform-origin: center; transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1); }

/* Mãos */
.hand { position: relative; display:flex; gap:4px; justify-content: center; align-items: center; padding: 5px; background: rgba(0,0,0,0.4); min-height: 55px; z-index: 100; }
.hand-side { width: 60px; flex-direction: column; height: 100%; }
.active-turn { box-shadow: inset 0 0 20px var(--turn-indicator); background: rgba(231, 76, 60, 0.2); }

/* QoL: Indicadores de Contagem e Passo */
.hand-indicators { display: flex; align-items: center; justify-content: center; gap: 5px; }
.hand-side .hand-indicators { flex-direction: column; margin-top: 8px; }

.tile-count {
    background: #111; color: var(--accent-gold); border: 2px solid var(--accent-gold);
    border-radius: 50%; width: 22px; height: 22px; display: flex; justify-content: center; align-items: center;
    font-size: 11px; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.6);
    flex-shrink: 0;
}

.pass-x {
    color: #e74c3c; font-size: 20px; font-weight: bold;
    text-shadow: 0 0 10px rgba(231, 76, 60, 0.8);
    animation: pulse-x 1.5s infinite;
    line-height: 1;
}
@keyframes pulse-x {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
}

/* Peças base */
.tile { 
    background: var(--tile-color); border: 1px solid var(--line-color); 
    display: flex; border-radius: 3px; position: absolute; box-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}
.tile-h { width: 34px; height: 17px; }
.tile-v { width: 17px; height: 34px; flex-direction: column; }
.tile-h .half:first-child { border-right: 1px solid #ccc; }
.tile-v .half:first-child { border-bottom: 1px solid #ccc; }

/* Pips (Bolinhas) */
.half { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); padding: 2px; align-items: center; justify-items: center; }
.pip { width: 3.5px; height: 3.5px; background: #222; border-radius: 50%; box-shadow: inset -1px -1px 1px rgba(0,0,0,0.4); }

/* Carroça: Apenas as bolinhas coloridas */
.tile-double:not(.hidden) .pip { 
    background: #e74c3c !important;
    box-shadow: inset -1px -1px 1px rgba(0,0,0,0.6), 0 0 2px #e74c3c !important;
}

/* Destaque e Interação (Sem animação de pulso nas peças) */
.last-move { border-color: var(--accent-gold) !important; box-shadow: 0 0 10px 2px var(--accent-gold) !important; z-index: 20; }
.moving-proxy { position: fixed; pointer-events: none; z-index: 5000; box-shadow: 8px 12px 20px rgba(0,0,0,0.4); }
.tile-rel { position: relative !important; display: flex !important; }
.hidden { background: #34495e !important; }
.hidden .pip { opacity: 0; }
.playable { background: #fffde0 !important; border: 2px solid var(--accent-gold) !important; cursor:pointer; }

#side-picker { position: absolute; bottom: 70px; width: 100%; display: none; justify-content: center; gap: 8px; z-index: 4000; }
.btn-side { padding: 12px 20px; border-radius: 25px; background: #000; color: #fff; border: 2px solid var(--accent-gold); font-weight: bold; cursor: pointer; }
.btn-cancel { background: #c0392b; border-color: #e74c3c; }
.next-btn { background: #10ac84; color: white; border: none; padding: 12px 40px; border-radius: 4px; font-weight: bold; margin-top: 10px; cursor: pointer; text-transform: uppercase; transition: background 0.2s; }
.next-btn:active { background: #0b8e6b; }
</style>
</head>
<body>

<div id="start-screen">
    <h1 class="start-title">Dominó Master</h1>
    <h3 class="start-sub">Configure a nova mesa</h3>
    <button class="start-btn" onclick="initMatch(3)">Primeiro a 3 <b>(Vence a dupla que alcançar 3 vitórias)</b></button>
    <button class="start-btn" onclick="initMatch(5)">Primeiro a 5 <b>(Vence a dupla que alcançar 5 vitórias)</b></button>
    <button class="start-btn" onclick="initMatch(10)">Primeiro a 10 <b>(Vence a dupla que alcançar 10 vitórias)</b></button>
</div>

<div id="header">
    <div class="team-score"><span>Sua Dupla</span><b id="scoreA">0</b></div>
    <div id="game-status">Dominó Master</div>
    <div class="team-score"><span>Bots Oponentes</span><b id="scoreB">0</b></div>
</div>

<div id="result-area">
    <h2 id="res-title">FIM DA RODADA</h2>
    <div id="res-detail" style="font-size: 13px; margin: 8px 0; color: #444;"></div>
    <button id="next-btn" class="next-btn">Jogar Próxima</button>
</div>

<div id="game-area">
    <div id="hand-2" class="hand"></div>
    <div style="display:flex; flex:1; overflow:hidden;">
        <div id="hand-1" class="hand hand-side"></div>
        <div id="board-container"><div id="snake"></div></div>
        <div id="hand-3" class="hand hand-side"></div>
    </div>
    <div id="hand-0" class="hand"></div>
    
    <div id="side-picker">
        <button class="btn-side" onclick="executeMove(0)">⬆ Cima</button>
        <button class="btn-side btn-cancel" onclick="cancelMove()">✖ Cancelar</button>
        <button class="btn-side" onclick="executeMove(1)">Baixo ⬇</button>
    </div>
</div>

<script>
/** MOTOR HSC SÊNIOR - MULTIPLAYER FLOW E MIND GAMES **/
let hands=[], extremes=[null,null], current=0, scores=[0,0], pendingIdx=null, isBlocked=false, isOver=false, roundWinner=null, positions=[], passCount=0;
let playerPassed = [false, false, false, false]; 
let autoNextInterval = null; // Controle do timer de próxima rodada

let targetScore = 1; 
let ends = [];
let playerMemory = [[], [], [], []];
const playerNames = ["VOCÊ", "BOT 1", "SEU PARCEIRO", "BOT 3"];
let audioCtx = null;

function safeAudioInit() {
    try {
        if (!audioCtx) {
            const A = window.AudioContext || window.webkitAudioContext;
            if(A) audioCtx = new A();
        }
        if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    } catch(e) {}
}

function playClackSound() {
    if (typeof navigator.vibrate === 'function') navigator.vibrate(40);
    try {
        if (!audioCtx) return; 
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle'; 
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.04);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.04);
    } catch(e) {} 
}

function getPips(val) {
    if(val === 0) return '';
    let p = '';
    if(val===1) p='<div class="pip" style="grid-area:2/2"></div>';
    else if(val===2) p='<div class="pip" style="grid-area:1/3"></div><div class="pip" style="grid-area:3/1"></div>';
    else if(val===3) p='<div class="pip" style="grid-area:1/3"></div><div class="pip" style="grid-area:2/2"></div><div class="pip" style="grid-area:3/1"></div>';
    else if(val===4) p='<div class="pip" style="grid-area:1/1"></div><div class="pip" style="grid-area:1/3"></div><div class="pip" style="grid-area:3/1"></div><div class="pip" style="grid-area:3/3"></div>';
    else if(val===5) p='<div class="pip" style="grid-area:1/1"></div><div class="pip" style="grid-area:1/3"></div><div class="pip" style="grid-area:2/2"></div><div class="pip" style="grid-area:3/1"></div><div class="pip" style="grid-area:3/3"></div>';
    else if(val===6) p='<div class="pip" style="grid-area:1/1"></div><div class="pip" style="grid-area:1/3"></div><div class="pip" style="grid-area:2/1"></div><div class="pip" style="grid-area:2/3"></div><div class="pip" style="grid-area:3/1"></div><div class="pip" style="grid-area:3/3"></div>';
    return p;
}

function initMatch(limit) {
    safeAudioInit(); 
    targetScore = limit;
    scores = [0, 0];
    document.getElementById('scoreA').innerText = 0;
    document.getElementById('scoreB').innerText = 0;
    document.getElementById('start-screen').style.display = 'none';
    roundWinner = null; 
    startRound();
}

function startRound() {
    safeAudioInit();
    if(autoNextInterval) clearInterval(autoNextInterval); // Limpa qualquer timer pendente
    
    isOver=false; isBlocked=false; passCount=0;
    playerPassed.fill(false);
    playerMemory = [[], [], [], []];
    document.getElementById('result-area').style.display='none';
    
    window.minScaleReached = 1.2;
    window.currentSnakeScale = 1.2;
    window.currentSnakeCx = 0;
    window.currentSnakeCy = 0;

    const d=[]; for(let i=0;i<=6;i++) for(let j=i;j<=6;j++) d.push([i,j]);
    d.sort(()=>Math.random()-0.5);
    hands=[d.splice(0,7), d.splice(0,7), d.splice(0,7), d.splice(0,7)];
    positions=[]; extremes=[null,null];
    
    ends = [
        {hscX: 0, hscY: 0, dir: 270, lineCount: 1, lastVDir: 270, wasDouble: false},
        {hscX: 0, hscY: 0, dir: 90, lineCount: 1, lastVDir: 90, wasDouble: false}
    ];

    if(roundWinner !== null) current = roundWinner;
    else hands.forEach((h,i)=>h.forEach(t=>{if(t[0]===6&&t[1]===6)current=i}));
    
    document.getElementById('snake').innerHTML = '';
    document.getElementById('snake').style.transform = `scale(1.2) translate(0px, 0px)`;
    renderHands();
    processTurn();
}

function renderHands(reveal = false) {
    for(let i=0;i<4;i++){
        const c=document.getElementById(`hand-${i}`); c.innerHTML='';
        c.className=`hand ${i%2!==0?'hand-side':''} ${i===current && !isOver?'active-turn':''}`;

        // Contêiner de peças
        hands[i].forEach((t,idx)=>{
            const e=document.createElement('div');
            let isDoubleClass = (t[0] === t[1]) ? 'tile-double' : '';
            e.className=`tile tile-rel ${i%2!==0?'tile-v':'tile-h'} ${(!reveal&&i!==0)?'hidden':''} ${isDoubleClass}`;
            e.innerHTML=`<div class="half">${getPips(t[0])}</div><div class="half">${getPips(t[1])}</div>`;
            if(i===0) e.id=`my-tile-${idx}`;
            c.appendChild(e);
        });

        // Contêiner de Indicadores (Contagem + Passo)
        if(hands[i].length > 0 && !isOver) {
            const indicators = document.createElement('div');
            indicators.className = 'hand-indicators';
            
            if(playerPassed[i]) {
                const xMark = document.createElement('div');
                xMark.className = 'pass-x';
                xMark.innerText = '❌';
                indicators.appendChild(xMark);
            }

            const badge = document.createElement('div');
            badge.className = 'tile-count';
            badge.innerText = hands[i].length;
            indicators.appendChild(badge);

            c.appendChild(indicators);
        }
    }
}

function play(pIdx, tIdx, side) {
    if(isOver) return;
    
    playerPassed.fill(false); // Reseta o status de "Passou" de todo mundo ao jogar uma peça

    const tile = hands[pIdx].splice(tIdx, 1)[0];
    const isD = (tile[0] === tile[1]);
    let nP = {};

    if(!positions.length){
        extremes = [tile[0], tile[1]]; 
        let isV = !isD; 
        nP = {x: 0, y: 0, v1: tile[0], v2: tile[1], isV: isV};
        
        if (isD) {
            ends[0] = {hscX: 0, hscY: 0, dir: 270, lineCount: 1, lastVDir: 270, wasDouble: true};
            ends[1] = {hscX: 0, hscY: 0, dir: 90, lineCount: 1, lastVDir: 90, wasDouble: true};
        } else {
            ends[0] = {hscX: 0, hscY: -8.5, dir: 270, lineCount: 1, lastVDir: 270, wasDouble: false};
            ends[1] = {hscX: 0, hscY: 8.5, dir: 90, lineCount: 1, lastVDir: 90, wasDouble: false};
        }
    } else {
        const c = extremes[side];
        const v_match = (tile[0] === c) ? tile[0] : tile[1];
        const v_other = (tile[0] === c) ? tile[1] : tile[0];
        extremes[side] = v_other; 
        
        let e = ends[side];
        let isVertFlow = (e.dir === 90 || e.dir === 270);
        let maxCount = isVertFlow ? 6 : 2;

        if (e.lineCount >= maxCount && !isD && !e.wasDouble) {
            if (isVertFlow) {
                e.lastVDir = e.dir;
                e.dir = (side === 1) ? 0 : 180; 
            } else {
                e.dir = (e.lastVDir === 90) ? 270 : 90; 
            }
            e.lineCount = 1;
            isVertFlow = (e.dir === 90 || e.dir === 270);
        }
        
        e.lineCount++;

        let dx = 0, dy = 0;
        if (e.dir === 0) dx = 1;
        else if (e.dir === 180) dx = -1;
        else if (e.dir === 90) dy = 1;
        else if (e.dir === 270) dy = -1;

        let chX = e.hscX + 17 * dx;
        let chY = e.hscY + 17 * dy;

        let cx, cy, newHscX, newHscY;
        let isV = isVertFlow ? !isD : isD; 

        if (isD) {
            cx = chX;
            cy = chY;
            newHscX = chX;
            newHscY = chY;
        } else {
            let secondHscX = chX + 17 * dx;
            let secondHscY = chY + 17 * dy;
            cx = (chX + secondHscX) / 2; 
            cy = (chY + secondHscY) / 2;
            newHscX = secondHscX;
            newHscY = secondHscY;
        }

        let swap = (e.dir === 180 || e.dir === 270);

        nP = {
            x: cx,
            y: cy,
            v1: swap ? v_other : v_match,
            v2: swap ? v_match : v_other,
            isV: isV
        };

        e.hscX = newHscX;
        e.hscY = newHscY;
        e.wasDouble = isD;
    }

    positions.push(nP);
    try { updateSnakeScale(); } catch(err){}
    passCount = 0;

    animatePrecise(pIdx, nP, () => {
        const staticT = document.createElement('div');
        staticT.className = `tile ${nP.isV ? 'tile-v' : 'tile-h'}`;
        
        staticT.style.left = (nP.x - (nP.isV ? 8.5 : 17)) + 'px';
        staticT.style.top = (nP.y - (nP.isV ? 17 : 8.5)) + 'px';
        staticT.innerHTML = `<div class="half">${getPips(nP.v1)}</div><div class="half">${getPips(nP.v2)}</div>`;
        
        document.querySelectorAll('.last-move').forEach(el => el.classList.remove('last-move'));
        staticT.classList.add('last-move');
        
        document.getElementById('snake').appendChild(staticT);
        
        if(hands[pIdx].length===0) { roundWinner=pIdx; renderHands(true); end("win", pIdx); }
        else { current=(current+1)%4; renderHands(); processTurn(); }
    });
}

function animatePrecise(pIdx, target, cb) {
    const hand = document.getElementById(`hand-${pIdx}`);
    const proxy = document.createElement('div');
    proxy.className = `tile moving-proxy ${target.isV ? 'tile-v' : 'tile-h'}`;
    proxy.innerHTML = `<div class="half">${getPips(target.v1)}</div><div class="half">${getPips(target.v2)}</div>`;
    
    proxy.style.transition = 'none'; 
    proxy.style.opacity = '1';
    document.body.appendChild(proxy);

    const hRect = hand.getBoundingClientRect();
    const startX = hRect.left + hRect.width/2;
    const startY = hRect.top + hRect.height/2;

    const bRect = document.getElementById('board-container').getBoundingClientRect();
    const boardCenterX = bRect.left + bRect.width / 2;
    const boardCenterY = bRect.top + bRect.height / 2;
    
    const scale = window.currentSnakeScale || 1;
    const cx = window.currentSnakeCx || 0;
    const cy = window.currentSnakeCy || 0;
    
    const destX = boardCenterX + (target.x + cx) * scale;
    const destY = boardCenterY + (target.y + cy) * scale;

    const duration = 500; 
    const startTime = performance.now();

    function step(currentTime) {
        const elapsedTime = currentTime - startTime;
        let progress = Math.min(elapsedTime / duration, 1);
        
        const currentX = startX + (destX - startX) * progress;
        const currentY = startY + (destY - startY) * progress;
        const currentScale = 0.4 + (scale - 0.4) * progress;

        proxy.style.left = `${currentX}px`;
        proxy.style.top = `${currentY}px`;
        proxy.style.transform = `translate(-50%, -50%) scale(${currentScale})`;

        if (progress < 1) {
            requestAnimationFrame(step);
        } else {
            playClackSound(); 
            proxy.style.left = `${destX}px`;
            proxy.style.top = `${destY}px`;
            proxy.style.transform = `translate(-50%, -50%) scale(${scale})`;

            setTimeout(() => {
                proxy.remove();
                cb();
            }, 10);
        }
    }
    requestAnimationFrame(step);
}

function updateSnakeScale() {
    const s = document.getElementById('snake');
    const b = document.getElementById('board-container');
    if(!positions.length) return;
    
    let minX=0, maxX=0, minY=0, maxY=0;
    positions.forEach(p=>{
        const w=p.isV?8.5:17, h=p.isV?17:8.5;
        minX=Math.min(minX, p.x-w); maxX=Math.max(maxX, p.x+w);
        minY=Math.min(minY, p.y-h); maxY=Math.max(maxY, p.y+h);
    });
    
    const padding = 60; 
    const neededWidth = (maxX - minX) + padding;
    const neededHeight = (maxY - minY) + padding;
    
    const scaleX = b.clientWidth / (neededWidth || 1);
    const scaleY = b.clientHeight / (neededHeight || 1);
    
    const targetScale = Math.min(scaleX, scaleY, 1.2);
    
    if (typeof window.minScaleReached === 'undefined') window.minScaleReached = 1.2;
    if (targetScale < window.minScaleReached) {
        window.minScaleReached = targetScale;
    }
    
    const cx = -(minX + maxX) / 2;
    const cy = -(minY + maxY) / 2;

    s.style.transform = `scale(${window.minScaleReached}) translate(${cx}px, ${cy}px)`;
    
    window.currentSnakeScale = window.minScaleReached;
    window.currentSnakeCx = cx;
    window.currentSnakeCy = cy;
}

function processTurn() {
    if(isOver) return;
    
    const gameStatus = document.getElementById('game-status');
    const moves = getMoves(hands[current]);

    if (!positions.length && roundWinner === null) {
        isBlocked = true; 
        gameStatus.innerText = `${playerNames[current]} SAINDO COM O 6|6...`;
        setTimeout(() => {
            play(current, moves[0].idx, 1); 
        }, 1200);
        return; 
    }

    if(!moves.length){
        passCount++;
        playerPassed[current] = true; 
        
        if(extremes[0] !== null) {
            if(!playerMemory[current].includes(extremes[0])) playerMemory[current].push(extremes[0]);
            if(!playerMemory[current].includes(extremes[1])) playerMemory[current].push(extremes[1]);
        }
        
        gameStatus.innerText = `❌ ${playerNames[current]} PASSOU ❌`;
        gameStatus.style.color = "#e74c3c"; 
        
        renderHands();

        // CONGELAMENTO DE 2 SEGUNDOS PARA "LEITURA DE MESA"
        setTimeout(() => { 
            gameStatus.style.color = "var(--accent-gold)"; 
        }, 2000);
        
        if(passCount >= 4) { setTimeout(() => end("blocked"), 2000); return; }
        
        setTimeout(() => { current=(current+1)%4; renderHands(); processTurn(); }, 2000);
        return;
    }
    
    if(current===0){ 
        isBlocked=false; 
        gameStatus.innerText = "SUA VEZ!"; 
        if (typeof navigator.vibrate === 'function') navigator.vibrate([30, 50, 30]);
        highlight(moves); 
    } else {
        gameStatus.innerText = `${playerNames[current]} JOGANDO...`;
        setTimeout(() => {
            const m = moves.map(move => {
                const tile = hands[current][move.idx];
                const sideToPlay = move.side === 'both' ? 0 : (move.side === 'any' ? 1 : move.side);
                let weight = tile[0] + tile[1];
                if (tile[0] === tile[1]) weight += 25;
                const nextExtreme = (tile[0] === extremes[sideToPlay]) ? tile[1] : tile[0];
                const nextOpponent = (current + 1) % 4;
                if (playerMemory[nextOpponent].includes(nextExtreme)) weight += 50;
                const partner = (current + 2) % 4;
                if (playerMemory[partner].includes(nextExtreme)) weight -= 40;
                return { ...move, weight };
            }).sort((a, b) => b.weight - a.weight)[0];

            play(current, m.idx, m.side==='both'?0:(m.side==='any'?1:m.side));
        }, 1200); 
    }
}

function getMoves(h){
    if(!positions.length) {
        if (roundWinner === null) {
            const idx66 = h.findIndex(t => t[0] === 6 && t[1] === 6);
            if (idx66 !== -1) return [{idx: idx66, side: 'any'}];
        }
        return h.map((_,i)=>({idx:i,side:'any'}));
    }
    
    return h.map((t,i)=>{
        let L=(t[0]===extremes[0]||t[1]===extremes[0]), R=(t[0]===extremes[1]||t[1]===extremes[1]);
        return L&&R?{idx:i,side:'both'}:L?{idx:i,side:0}:R?{idx:i,side:1}:null;
    }).filter(m=>m);
}

function highlight(m){
    m.forEach(x=>{
        const el=document.getElementById(`my-tile-${x.idx}`);
        if(el){ 
            el.classList.add('playable'); 
            el.onclick=()=>{
                safeAudioInit();
                if(isBlocked) return;
                const isLast = hands[0].length === 1;
                if(x.side==='both' && extremes[0]!==extremes[1] && !isLast){ 
                    pendingIdx=x.idx; document.getElementById('side-picker').style.display='flex'; isBlocked=true; 
                } else { 
                    isBlocked=true; 
                    play(0, x.idx, (x.side==='both'||x.side==='any')?1:x.side); 
                }
            };
        }
    });
}

function cancelMove() {
    document.getElementById('side-picker').style.display = 'none';
    isBlocked = false; 
    pendingIdx = null;
}

function executeMove(s){
    document.getElementById('side-picker').style.display='none';
    isBlocked = false; play(0, pendingIdx, s);
}

function end(type, idx) {
    if(isOver) return;
    isOver=true;
    let sA=hands[0].concat(hands[2]).reduce((s,t)=>s+t[0]+t[1],0), sB=hands[1].concat(hands[3]).reduce((s,t)=>s+t[0]+t[1],0);
    let winTeam=-1;
    const titleEl = document.getElementById('res-title'), detailEl = document.getElementById('res-detail');
    
    if(type==="win"){ 
        winTeam=(idx%2===0)?0:1; 
        titleEl.innerText = winTeam === 0 ? "VITÓRIA DA SUA DUPLA! 🎉" : "OS BOTS VENCERAM A RODADA.";
        detailEl.innerText = `${playerNames[idx]} bateu o jogo!`;
    } else {
        if(sA<sB) winTeam=0; else if(sB<sA) winTeam=1;
        titleEl.innerText = "O JOGO TRANCOU!";
        detailEl.innerText = winTeam===0 ? `Sua dupla venceu nos pontos! (${sA} vs ${sB})` : `Bots venceram nos pontos! (${sB} vs ${sA})`;
        roundWinner = winTeam === 0 ? 0 : 1;
    }
    
    if(winTeam!==-1) scores[winTeam]++;
    document.getElementById('scoreA').innerText=scores[0]; document.getElementById('scoreB').innerText=scores[1];
    
    const resultArea = document.getElementById('result-area');
    const nextBtn = document.getElementById('next-btn');
    
    if (scores[winTeam] >= targetScore) {
        // FIM DO TORNEIO (Precisa de clique para recomeçar)
        titleEl.innerText = winTeam === 0 ? "🏆 CAMPEÕES DA PARTIDA! 🏆" : "💀 FIM DE JOGO. BOTS VENCERAM. 💀";
        detailEl.innerText = `O placar final do torneio foi ${scores[0]} a ${scores[1]}`;
        nextBtn.innerText = "Novo Jogo";
        nextBtn.onclick = () => {
            resultArea.style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        };
    } else {
        // FLOW DE MULTIPLAYER (Contagem regressiva automática)
        let timeLeft = 4;
        nextBtn.innerText = `Próxima (${timeLeft}s)`;
        
        autoNextInterval = setInterval(() => {
            timeLeft--;
            if(timeLeft > 0) {
                nextBtn.innerText = `Próxima (${timeLeft}s)`;
            } else {
                clearInterval(autoNextInterval);
                startRound();
            }
        }, 1000);

        // Se o jogador estiver apressado, ele pode clicar e pular o tempo
        nextBtn.onclick = () => {
            clearInterval(autoNextInterval);
            startRound();
        };
    }
    
    resultArea.style.display='block';
}
</script>
